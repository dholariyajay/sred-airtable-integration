<mat-toolbar color="primary">
  <span>Raw Data</span>
  <span class="spacer"></span>
  <span>SRED.io — Airtable Integration</span>
  <span class="spacer"></span>
  <span>Raw Data Logs</span>
</mat-toolbar>

<div class="dashboard-container">
  <!-- Action bar -->
  <div class="action-bar">
    <button mat-raised-button color="primary"
            *ngIf="!isConnected"
            (click)="connectAirtable()">
      <mat-icon>link</mat-icon> Connect Airtable
    </button>

    <button mat-raised-button color="accent"
            *ngIf="isConnected"
            [disabled]="isSyncing"
            (click)="startSync()">
      <mat-icon>sync</mat-icon>
      {{ isSyncing ? 'Syncing...' : 'Sync Data' }}
    </button>

    <span class="connection-status" [class.connected]="isConnected">
      {{ isConnected ? '● Connected' : '○ Not Connected' }}
    </span>
  </div>

  <!-- Filter bar -->
  <mat-card class="filter-bar" *ngIf="isConnected">
    <div class="filter-row">
      <mat-form-field appearance="outline">
        <mat-label>Active Integrations</mat-label>
        <mat-select [(value)]="activeIntegration">
          <mat-option value="airtable">Airtable</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Entity</mat-label>
        <mat-select [(value)]="selectedCollection" (selectionChange)="onCollectionChange()">
          <mat-option *ngFor="let col of collections" [value]="col">{{ col }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </mat-card>

  <!-- AG Grid -->
  <div class="grid-container" *ngIf="selectedCollection">
    <mat-spinner *ngIf="isLoading" diameter="40"></mat-spinner>

    <ag-grid-angular
      *ngIf="!isLoading"
      class="ag-theme-alpine"
      [rowData]="rowData"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="true"
      [paginationPageSize]="paginationPageSize"
      [rowSelection]="'multiple'"
      [animateRows]="true"
      (gridReady)="onGridReady($event)"
      style="width: 100%; height: 600px;">
    </ag-grid-angular>
  </div>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="!selectedCollection && isConnected">
    <mat-icon>table_chart</mat-icon>
    <p>Select an entity from the dropdown to view data</p>
  </div>
</div>
